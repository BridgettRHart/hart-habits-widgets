<title>Hart Habits — Nautilus Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
.hhn-wrap {
  font-family: 'Josefin Sans', sans-serif;
  position: relative;
  max-width: 600px;
  min-width: 260px;
  margin: 0 auto;
  -webkit-tap-highlight-color: transparent;
}
/* Spacer image holds the container's aspect ratio */
.hhn-spacer {
  display: block;
  width: 100%;
  visibility: hidden;
  pointer-events: none;
}
/* All PNG layers + canvas share the same absolute footprint */
.hhn-layer, #hhnCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
}
.hhn-layer { pointer-events: none; }
#hhnCanvas { cursor: default; }

/* Tooltip */
.hhn-tip {
  display: none;
  position: absolute;
  background: #fdfcfb;
  border: 0.5px solid rgba(0,0,0,0.10);
  border-radius: 10px;
  padding: 14px 16px 12px;
  width: 230px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.10);
  pointer-events: none;
  z-index: 20;
}
.hhn-tip.show { display: block; }
.hhn-t-num {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #c18c5d;
  margin: 0 0 3px;
  font-weight: 400;
}
.hhn-t-name {
  font-size: 16px;
  font-weight: 600;
  color: #2a2a2a;
  letter-spacing: 0.07em;
  margin: 0 0 8px;
}
.hhn-t-decl {
  font-size: 12.5px;
  font-style: italic;
  color: #555;
  line-height: 1.65;
  margin: 0 0 11px;
  font-weight: 400;
}
.hhn-t-link {
  font-size: 11.5px;
  font-weight: 500;
  color: #056367;
  text-decoration: none;
  letter-spacing: 0.04em;
}
.hhn-t-link:hover { text-decoration: underline; }

/* Layer legend */
.hhn-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 5px 14px;
  justify-content: center;
  margin-top: 10px;
}
.hhn-legend span {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  letter-spacing: 0.05em;
  color: #666;
}
.hhn-legend i {
  width: 9px; height: 9px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
</style>

<div class="hhn-wrap" id="hhnWrap">

  <!--
    PNG layers — stacked in order (bottom to top):
    1. Long Game  (bronze outer shell)
    2. White outline (ring border + dividing lines)
    3. Foundation  (peach: SELF + TRUTH)
    4. Operating   (teal: TRUST, THOUGHTS, TALK, NON-VERBALS)
    5. Evidence    (plum: SHOW + PROTECT)

    To deploy on WordPress, replace the src paths with your
    WordPress media library URLs for each file.
  -->
  <img class="hhn-layer" src="nautilus-zone-4-longgame.png"    alt="">
  <img class="hhn-layer" src="nautilus-white-outline.png"       alt="">
  <img class="hhn-layer" src="nautilus-zone-1-foundation.png"  alt="">
  <img class="hhn-layer" src="nautilus-zone-2-operating.png"   alt="">
  <img class="hhn-layer" src="nautilus-zone-3-evidence.png"    alt="">

  <!-- Spacer keeps the 1:1 ratio -->
  <img class="hhn-spacer" src="nautilus-zone-4-longgame.png" alt="">

  <!-- Interaction overlay -->
  <canvas id="hhnCanvas"></canvas>

  <!-- Tooltip -->
  <div class="hhn-tip" id="hhnTip">
    <p class="hhn-t-num" id="htnNum"></p>
    <p class="hhn-t-name" id="htnName"></p>
    <p class="hhn-t-decl" id="htnDecl"></p>
    <a class="hhn-t-link" id="htnLink" href="#"></a>
  </div>
</div>

<div class="hhn-legend">
  <span><i style="background:#f5c9a4"></i>Foundation</span>
  <span><i style="background:#8eccd4"></i>Operating</span>
  <span><i style="background:#6b576b"></i>Evidence</span>
  <span><i style="background:#c2925e"></i>Long Game</span>
</div>

<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------------
  // Habit data
  // All positions (cx, cy, rx, ry) are in the native 600×600 image space.
  // The canvas scales these by (displayWidth / 600) at runtime.
  //
  // Hit-test order: top visual layers first (evidence → operating → foundation
  // → long-game) so the topmost visible blob wins on overlap.
  // ---------------------------------------------------------------------------
  var habits = [
    // Evidence (plum) — checked first as they're visually on the right
    { id:'PROTECT', num:'08', layer:'Evidence',
      cx:312, cy:252, rx:68, ry:52,
      fill:'#6b576b',
      decl:'I protect myself and others from my feelings and judgements and I protect my secrets and theirs from the rest of the world.',
      url:'/protect' },
    { id:'SHOW', num:'07', layer:'Evidence',
      cx:308, cy:372, rx:66, ry:58,
      fill:'#6b576b',
      decl:'I give my inner world a form I can see, hear, touch, and show when it\'s time.',
      url:'/show' },

    // Operating (teal) — the C-shape on the left
    { id:'TRUST', num:'03', layer:'Operating',
      cx:128, cy:268, rx:56, ry:48,
      fill:'#8eccd4',
      decl:'I choose to trust as a default because I listen to my inner voice and I know how to see and carry truth.',
      url:'/trust' },
    { id:'THOUGHTS', num:'04', layer:'Operating',
      cx:96, cy:355, rx:54, ry:55,
      fill:'#8eccd4',
      decl:'I allow and direct my thoughts to focus on those things that I want to attract more of.',
      url:'/thoughts' },
    { id:'TALK', num:'05', layer:'Operating',
      cx:118, cy:447, rx:60, ry:48,
      fill:'#8eccd4',
      decl:'I use my words to exponentially strengthen and uplift myself and others.',
      url:'/talk' },
    { id:'NON-VERBALS', num:'06', layer:'Operating',
      cx:224, cy:463, rx:62, ry:44,
      fill:'#8eccd4',
      decl:'I keep my cool physically when faced with a tough situation. It gives me time to process before I respond.',
      url:'/non-verbals' },

    // Foundation (peach) — center blobs
    { id:'TRUTH', num:'02', layer:'Foundation',
      cx:238, cy:235, rx:55, ry:48,
      fill:'#f5c9a4',
      decl:'I face objective and subjective truths head on and carry them simultaneously, even when they conflict.',
      url:'/truth' },
    { id:'SELF', num:'01', layer:'Foundation',
      cx:248, cy:325, rx:58, ry:55,
      fill:'#f5c9a4',
      decl:'I am an exquisite and unique being. Everything flows through me and I know, love, and respect the vessel I live in.',
      url:'/self' },

    // Long Game (bronze outer shell) — checked last; split by position
    { id:'HOPE', num:'10', layer:'Long Game',
      cx:456, cy:138, rx:92, ry:58,
      fill:'#c2925e',
      decl:'I maintain or find hope, even when it is not easy.',
      url:'/hope' },
    { id:'ENDURE', num:'09', layer:'Long Game',
      cx:488, cy:312, rx:75, ry:95,
      fill:'#c2925e',
      decl:'I consistently implement realistic small steps towards my vision.',
      url:'/endure' }
  ];

  // ---------------------------------------------------------------------------
  // Canvas setup
  // ---------------------------------------------------------------------------
  var canvas  = document.getElementById('hhnCanvas');
  var ctx     = canvas.getContext('2d');
  var wrap    = document.getElementById('hhnWrap');
  var tip     = document.getElementById('hhnTip');
  var NATIVE  = 600; // PNG native size

  function scale() { return wrap.offsetWidth / NATIVE; }

  function resizeCanvas() {
    var s = wrap.offsetWidth;
    canvas.width  = s;
    canvas.height = s;
  }
  resizeCanvas();
  window.addEventListener('resize', function () {
    resizeCanvas();
    renderHover(null); // clear
  });

  // ---------------------------------------------------------------------------
  // Hit testing — ellipse check in native coords
  // ---------------------------------------------------------------------------
  function getHabit(clientX, clientY) {
    var rect = wrap.getBoundingClientRect();
    var s    = scale();
    var nx   = (clientX - rect.left)  / s; // native coords
    var ny   = (clientY - rect.top)   / s;

    for (var i = 0; i < habits.length; i++) {
      var h  = habits[i];
      var dx = (nx - h.cx) / h.rx;
      var dy = (ny - h.cy) / h.ry;
      if (dx * dx + dy * dy <= 1) return h;
    }
    return null;
  }

  // ---------------------------------------------------------------------------
  // Hover glow — draw a white radial-gradient ellipse over the hovered blob
  // ---------------------------------------------------------------------------
  function renderHover(h) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!h) return;

    var s  = scale();
    var cx = h.cx * s;
    var cy = h.cy * s;
    var rx = h.rx * s;
    var ry = h.ry * s;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(rx, ry);
    var grad = ctx.createRadialGradient(0, 0, 0.1, 0, 0, 1);
    grad.addColorStop(0,   'rgba(255,255,255,0.38)');
    grad.addColorStop(0.65,'rgba(255,255,255,0.18)');
    grad.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';
  }

  // ---------------------------------------------------------------------------
  // Tooltip
  // ---------------------------------------------------------------------------
  function showTip(h) {
    document.getElementById('htnNum').textContent  = h.num + '  |  ' + h.layer;
    document.getElementById('htnName').textContent = h.id;
    document.getElementById('htnDecl').textContent = '"' + h.decl + '"';
    var lnk = document.getElementById('htnLink');
    lnk.textContent = 'Explore ' + h.id + ' →';
    lnk.href = h.url;
    tip.classList.add('show');
  }
  function hideTip() { tip.classList.remove('show'); }

  function placeTip(clientX, clientY) {
    var rect = wrap.getBoundingClientRect();
    var x    = clientX - rect.left;
    var y    = clientY - rect.top;
    var tw   = 234, th = 172;
    var left = x + 14;
    var top  = y - th - 10;
    if (left + tw > rect.width - 4) left = x - tw - 14;
    if (left < 4) left = 4;
    if (top < 4)  top  = y + 14;
    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
  }

  function placeTipNear(h) {
    var s  = scale();
    var cx = wrap.getBoundingClientRect().left + h.cx * s;
    var cy = wrap.getBoundingClientRect().top  + h.cy * s;
    placeTip(cx, cy);
  }

  // ---------------------------------------------------------------------------
  // Desktop: hover + click
  // ---------------------------------------------------------------------------
  var isMobile  = !window.matchMedia('(hover: hover)').matches;
  var lastTapped = null;
  var curHabit   = null;

  canvas.addEventListener('mousemove', function (e) {
    if (isMobile) return;
    var h = getHabit(e.clientX, e.clientY);
    canvas.style.cursor = h ? 'pointer' : 'default';
    if (h !== curHabit) {
      curHabit = h;
      renderHover(h);
      if (h) { showTip(h); placeTip(e.clientX, e.clientY); }
      else   { hideTip(); }
    } else if (h) {
      placeTip(e.clientX, e.clientY);
    }
  });

  canvas.addEventListener('mouseleave', function () {
    if (isMobile) return;
    curHabit = null;
    renderHover(null);
    hideTip();
  });

  canvas.addEventListener('click', function (e) {
    var h = getHabit(e.clientX, e.clientY);
    if (!h) return;
    if (!isMobile) {
      window.location.href = h.url;
      return;
    }
    // Mobile: first tap = tooltip, second tap = navigate
    if (lastTapped === h.id) {
      window.location.href = h.url;
    } else {
      lastTapped = h.id;
      curHabit   = h;
      renderHover(h);
      showTip(h);
      placeTipNear(h);
      e.stopPropagation();
    }
  });

  // Close tooltip on outside tap (mobile)
  document.addEventListener('click', function () {
    if (!isMobile) return;
    hideTip();
    if (curHabit) { renderHover(null); curHabit = null; }
    lastTapped = null;
  });

})();
</script>
