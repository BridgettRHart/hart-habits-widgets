<title>Hart Habits — Nautilus Diagram</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
.hhn-wrap {
  font-family: 'Josefin Sans', sans-serif;
  position: relative;
  max-width: 600px;
  min-width: 260px;
  margin: 0 auto;
  -webkit-tap-highlight-color: transparent;
}
/* Spacer image holds the container's aspect ratio */
.hhn-spacer {
  display: block;
  width: 100%;
  visibility: hidden;
  pointer-events: none;
}
/* All PNG layers + canvas share the same absolute footprint */
.hhn-layer, #hhnCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
}
.hhn-layer { pointer-events: none; }
#hhnCanvas { cursor: default; }

/* Tooltip */
.hhn-tip {
  display: none;
  position: absolute;
  background: #fdfcfb;
  border: 0.5px solid rgba(0,0,0,0.10);
  border-radius: 10px;
  padding: 14px 16px 12px;
  width: 230px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.10);
  pointer-events: none;
  z-index: 20;
}
.hhn-tip.show { display: block; }
.hhn-t-num {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #c18c5d;
  margin: 0 0 3px;
  font-weight: 400;
}
.hhn-t-name {
  font-size: 16px;
  font-weight: 600;
  color: #2a2a2a;
  letter-spacing: 0.07em;
  margin: 0 0 8px;
}
.hhn-t-decl {
  font-size: 12.5px;
  font-style: italic;
  color: #555;
  line-height: 1.65;
  margin: 0 0 11px;
  font-weight: 400;
}
.hhn-t-link {
  font-size: 11.5px;
  font-weight: 500;
  color: #056367;
  text-decoration: none;
  letter-spacing: 0.04em;
}
.hhn-t-link:hover { text-decoration: underline; }

/* Layer legend */
.hhn-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 5px 14px;
  justify-content: center;
  margin-top: 10px;
}
.hhn-legend span {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  letter-spacing: 0.05em;
  color: #666;
}
.hhn-legend i {
  width: 9px; height: 9px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
</style>

<div class="hhn-wrap" id="hhnWrap">

  <!--
    PNG layers — stacked in order (bottom to top):
    1. Foundation  (peach fill: SELF + TRUTH)
    2. Operating   (teal fill: TRUST, THOUGHTS, TALK, NON-VERBALS)
    3. Evidence    (plum fill: SHOW + PROTECT)
    4. Long Game   (bronze shell — overlays blobs, defines segments)
    5. White outline (dividing lines on top)

    To deploy on WordPress, replace the src paths with your
    WordPress media library URLs for each file.
  -->
  <img class="hhn-layer" src="nautilus-zone-4-longgame.png"    alt="">
  <img class="hhn-layer" src="nautilus-zone-1-foundation.png"  alt="">
  <img class="hhn-layer" src="nautilus-zone-2-operating.png"   alt="">
  <img class="hhn-layer" src="nautilus-zone-3-evidence.png"    alt="">
  <img class="hhn-layer" src="nautilus-white-outline.png"       alt="">

  <!-- Spacer keeps the 1:1 ratio -->
  <img class="hhn-spacer" src="nautilus-zone-4-longgame.png" alt="">

  <!-- Interaction overlay -->
  <canvas id="hhnCanvas"></canvas>

  <!-- Tooltip -->
  <div class="hhn-tip" id="hhnTip">
    <p class="hhn-t-num" id="htnNum"></p>
    <p class="hhn-t-name" id="htnName"></p>
    <p class="hhn-t-decl" id="htnDecl"></p>
    <a class="hhn-t-link" id="htnLink" href="#"></a>
  </div>
</div>

<div class="hhn-legend">
  <span><i style="background:#f5c9a4"></i>Foundation</span>
  <span><i style="background:#8eccd4"></i>Operating</span>
  <span><i style="background:#6b576b"></i>Evidence</span>
  <span><i style="background:#c2925e"></i>Long Game</span>
</div>

<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------------
  // Habit data
  // All positions (cx, cy, rx, ry) are in the native 600×600 image space.
  // The canvas scales these by (displayWidth / 600) at runtime.
  //
  // Hit-test order: top visual layers first (evidence → operating → foundation
  // → long-game) so the topmost visible blob wins on overlap.
  // ---------------------------------------------------------------------------
  // cx/cy = hit-test center AND label center (native 600×600 px)
  // rx/ry = hit ellipse radii
  // fontSize = label size in native px (scaled at render time)
  var habits = [
    // Evidence (plum)
    { id:'PROTECT', num:'08', layer:'Evidence',
      cx:390, cy:315, rx:80, ry:62,
      fontSize:20, fill:'#6b576b',
      decl:'I protect myself and others from my feelings and judgements and I protect my secrets and theirs from the rest of the world.',
      url:'/protect' },
    { id:'SHOW', num:'07', layer:'Evidence',
      cx:378, cy:418, rx:76, ry:62,
      fontSize:18, fill:'#6b576b',
      decl:'I give my inner world a form I can see, hear, touch, and show when it\'s time.',
      url:'/show' },

    // Operating (teal)
    { id:'TRUST', num:'03', layer:'Operating',
      cx:148, cy:268, rx:58, ry:50,
      fontSize:15, fill:'#8eccd4',
      decl:'I choose to trust as a default because I listen to my inner voice and I know how to see and carry truth.',
      url:'/trust' },
    { id:'THOUGHTS', num:'04', layer:'Operating',
      cx:118, cy:358, rx:55, ry:52,
      fontSize:12, fill:'#8eccd4',
      decl:'I allow and direct my thoughts to focus on those things that I want to attract more of.',
      url:'/thoughts' },
    { id:'TALK', num:'05', layer:'Operating',
      cx:140, cy:447, rx:65, ry:52,
      fontSize:20, fill:'#8eccd4',
      decl:'I use my words to exponentially strengthen and uplift myself and others.',
      url:'/talk' },
    { id:'NON-VERBALS', num:'06', layer:'Operating',
      cx:242, cy:458, rx:65, ry:46,
      fontSize:11, fill:'#8eccd4',
      decl:'I keep my cool physically when faced with a tough situation. It gives me time to process before I respond.',
      url:'/non-verbals' },

    // Foundation (peach) — darker text on light background
    { id:'TRUTH', num:'02', layer:'Foundation',
      cx:245, cy:242, rx:52, ry:44,
      fontSize:13, fill:'#f5c9a4', textColor:'#5c3520',
      decl:'I face objective and subjective truths head on and carry them simultaneously, even when they conflict.',
      url:'/truth' },
    { id:'SELF', num:'01', layer:'Foundation',
      cx:248, cy:318, rx:56, ry:52,
      fontSize:18, fill:'#f5c9a4', textColor:'#5c3520',
      decl:'I am an exquisite and unique being. Everything flows through me and I know, love, and respect the vessel I live in.',
      url:'/self' },

    // Long Game (bronze) — HOPE upper-left, ENDURE right ear
    { id:'HOPE', num:'10', layer:'Long Game',
      cx:155, cy:118, rx:145, ry:85,
      fontSize:28, fill:'#c2925e',
      decl:'I maintain or find hope, even when it is not easy.',
      url:'/hope' },
    { id:'ENDURE', num:'09', layer:'Long Game',
      cx:438, cy:225, rx:110, ry:92,
      fontSize:22, fill:'#c2925e',
      decl:'I consistently implement realistic small steps towards my vision.',
      url:'/endure' }
  ];

  // ---------------------------------------------------------------------------
  // Canvas setup
  // ---------------------------------------------------------------------------
  var canvas  = document.getElementById('hhnCanvas');
  var ctx     = canvas.getContext('2d');
  var wrap    = document.getElementById('hhnWrap');
  var tip     = document.getElementById('hhnTip');
  var NATIVE  = 600; // PNG native size

  function scale() { return wrap.offsetWidth / NATIVE; }

  function resizeCanvas() {
    var s = wrap.offsetWidth;
    canvas.width  = s;
    canvas.height = s;
  }
  resizeCanvas();
  window.addEventListener('resize', function () {
    resizeCanvas();
    renderAll(curHabit);
  });

  // ---------------------------------------------------------------------------
  // Label rendering
  // ---------------------------------------------------------------------------
  function drawLabels() {
    var s = scale();
    ctx.save();
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor  = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur   = 4;

    habits.forEach(function (h) {
      var cx       = h.cx * s;
      var cy       = h.cy * s;
      var fontSize = Math.round(Math.max(7, h.fontSize * s));
      ctx.font      = '600 ' + fontSize + 'px "Josefin Sans", sans-serif';
      ctx.fillStyle = h.textColor || '#fff';
      ctx.letterSpacing = '0.08em';

      // Split hyphenated names (NON-VERBALS) onto two lines
      var parts = h.id.split('-');
      if (parts.length === 1) {
        ctx.fillText(h.id, cx, cy);
      } else {
        var lh = fontSize * 1.35;
        ctx.fillText(parts[0],  cx, cy - lh / 2);
        ctx.fillText(parts[1],  cx, cy + lh / 2);
      }
    });

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ---------------------------------------------------------------------------
  // Hit testing — ellipse check in native coords
  // ---------------------------------------------------------------------------
  function getHabit(clientX, clientY) {
    var rect = wrap.getBoundingClientRect();
    var s    = scale();
    var nx   = (clientX - rect.left)  / s; // native coords
    var ny   = (clientY - rect.top)   / s;

    for (var i = 0; i < habits.length; i++) {
      var h  = habits[i];
      var dx = (nx - h.cx) / h.rx;
      var dy = (ny - h.cy) / h.ry;
      if (dx * dx + dy * dy <= 1) return h;
    }
    return null;
  }

  // ---------------------------------------------------------------------------
  // Render: labels always, hover glow on top when active
  // ---------------------------------------------------------------------------
  function renderAll(h) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Hover glow first (under labels)
    if (h) {
      var s  = scale();
      var cx = h.cx * s;
      var cy = h.cy * s;
      var rx = h.rx * s;
      var ry = h.ry * s;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(rx, ry);
      var grad = ctx.createRadialGradient(0, 0, 0.1, 0, 0, 1);
      grad.addColorStop(0,   'rgba(255,255,255,0.38)');
      grad.addColorStop(0.65,'rgba(255,255,255,0.18)');
      grad.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.globalCompositeOperation = 'source-over';
    }

    // Labels always on top
    drawLabels();
  }

  // Draw labels as soon as fonts are ready
  document.fonts.ready.then(function () { renderAll(null); });

  // ---------------------------------------------------------------------------
  // Tooltip
  // ---------------------------------------------------------------------------
  function showTip(h) {
    document.getElementById('htnNum').textContent  = h.num + '  |  ' + h.layer;
    document.getElementById('htnName').textContent = h.id;
    document.getElementById('htnDecl').textContent = '"' + h.decl + '"';
    var lnk = document.getElementById('htnLink');
    lnk.textContent = 'Explore ' + h.id + ' →';
    lnk.href = h.url;
    tip.classList.add('show');
  }
  function hideTip() { tip.classList.remove('show'); }

  function placeTip(clientX, clientY) {
    var rect = wrap.getBoundingClientRect();
    var x    = clientX - rect.left;
    var y    = clientY - rect.top;
    var tw   = 234, th = 172;
    var left = x + 14;
    var top  = y - th - 10;
    if (left + tw > rect.width - 4) left = x - tw - 14;
    if (left < 4) left = 4;
    if (top < 4)  top  = y + 14;
    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
  }

  function placeTipNear(h) {
    var s  = scale();
    var cx = wrap.getBoundingClientRect().left + h.cx * s;
    var cy = wrap.getBoundingClientRect().top  + h.cy * s;
    placeTip(cx, cy);
  }

  // ---------------------------------------------------------------------------
  // Desktop: hover + click
  // ---------------------------------------------------------------------------
  var isMobile  = !window.matchMedia('(hover: hover)').matches;
  var lastTapped = null;
  var curHabit   = null;

  canvas.addEventListener('mousemove', function (e) {
    if (isMobile) return;
    var h = getHabit(e.clientX, e.clientY);
    canvas.style.cursor = h ? 'pointer' : 'default';
    if (h !== curHabit) {
      curHabit = h;
      renderAll(h);
      if (h) { showTip(h); placeTip(e.clientX, e.clientY); }
      else   { hideTip(); }
    } else if (h) {
      placeTip(e.clientX, e.clientY);
    }
  });

  canvas.addEventListener('mouseleave', function () {
    if (isMobile) return;
    curHabit = null;
    renderAll(null);
    hideTip();
  });

  canvas.addEventListener('click', function (e) {
    var h = getHabit(e.clientX, e.clientY);
    if (!h) return;
    if (!isMobile) {
      window.location.href = h.url;
      return;
    }
    // Mobile: first tap = tooltip, second tap = navigate
    if (lastTapped === h.id) {
      window.location.href = h.url;
    } else {
      lastTapped = h.id;
      curHabit   = h;
      renderAll(h);
      showTip(h);
      placeTipNear(h);
      e.stopPropagation();
    }
  });

  // Close tooltip on outside tap (mobile)
  document.addEventListener('click', function () {
    if (!isMobile) return;
    hideTip();
    if (curHabit) { renderAll(null); curHabit = null; }
    lastTapped = null;
  });

})();
</script>
